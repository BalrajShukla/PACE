<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACE Tool - Mobile Friendly</title>
    <style>
        /* Dark Theme Variables */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333333;
            --accent-blue: #4facfe;
            --success-green: #00e676;
            --warning-yellow: #ffea00;
            --danger-red: #ff1744;
        }

        body { 
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            max-width: 850px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
        }
        
        .container { 
            background-color: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid var(--border-color);
        }
        
        h2 { 
            text-align: center; 
            color: #ffffff; 
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }
        
        /* Dashboard & Gauge Styles */
        .dashboard { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-bottom: 40px; 
            padding: 30px 20px; 
            background: #252525; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
        }
        
        .gauge-container {
            width: 240px; height: 120px;
            position: relative; overflow: hidden;
            margin-bottom: 15px;
        }
        .gauge-bg {
            width: 240px; height: 240px;
            box-sizing: border-box; border-radius: 50%;
            border: 30px solid #333;
            position: absolute; top: 0; left: 0;
            border-bottom-color: transparent; border-right-color: transparent;
            transform: rotate(45deg);
        }
        .gauge-fill {
            width: 240px; height: 240px;
            box-sizing: border-box; border-radius: 50%;
            border: 30px solid var(--danger-red);
            position: absolute; top: 0; left: 0;
            border-bottom-color: transparent; border-right-color: transparent;
            transform: rotate(-135deg); 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.6s;
        }
        
        .score-container {
            position: absolute; bottom: 0; width: 100%;
            text-align: center; padding-bottom: 5px;
        }
        .score-display { 
            font-size: 48px; font-weight: bold; color: #ffffff; line-height: 1; 
        }
        .score-max { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
        
        .inference-badge { 
            margin-top: 15px; padding: 8px 24px; border-radius: 30px; 
            font-weight: bold; font-size: 16px; color: #ffffff; 
            background-color: var(--danger-red); 
            transition: background-color 0.6s, color 0.6s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .inference-text { 
            margin-top: 15px; text-align: center; font-size: 16px; 
            color: #cccccc; max-width: 550px; line-height: 1.5;
        }

        /* Slider Question Layout */
        .question { 
            margin-bottom: 25px; 
            padding: 25px; 
            background: #2a2a2a;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            transition: background 0.3s;
        }
        .question:hover { background: #303030; }
        
        .question-text { 
            font-size: 16px; 
            line-height: 1.5;
            margin-bottom: 20px;
            color: #ffffff;
        }

        /* Custom 3-Step Slider */
        .slider-wrapper {
            position: relative;
            width: 100%;
            padding: 0 10px;
            box-sizing: border-box;
        }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 0;
        }
        input[type=range]:focus { outline: none; }
        
        /* Slider Track */
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 8px; cursor: pointer;
            background: #444; border-radius: 4px;
        }
        input[type=range]::-moz-range-track {
            width: 100%; height: 8px; cursor: pointer;
            background: #444; border-radius: 4px;
        }
        
        /* Slider Thumb */
        input[type=range]::-webkit-slider-thumb {
            height: 26px; width: 26px; border-radius: 50%;
            background: var(--accent-blue); cursor: pointer;
            -webkit-appearance: none; margin-top: -9px; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: background 0.3s, transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.15); }
        
        input[type=range]::-moz-range-thumb {
            height: 26px; width: 26px; border-radius: 50%;
            background: var(--accent-blue); cursor: pointer; border: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Slider Labels (NO, MAYBE, YES) */
        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding: 0 2px;
            font-size: 13px;
            font-weight: bold;
            color: var(--text-muted);
        }
        .label-active { color: var(--accent-blue); }

        /* =========================================
           MOBILE RESPONSIVENESS (Media Queries)
           ========================================= */
        @media (max-width: 650px) {
            body { padding: 10px; }
            .container { padding: 25px 15px; }
            h2 { font-size: 20px; }
            
            /* Scale down the dashboard gauge slightly for small screens */
            .dashboard { padding: 20px 10px; margin-bottom: 25px; }
            .gauge-container { transform: scale(0.9); margin-bottom: 5px; }
            .score-display { font-size: 40px; }
            .inference-badge { font-size: 14px; padding: 6px 18px; margin-top: 5px; }
            .inference-text { font-size: 14px; }
            
            /* Adjust question cards */
            .question { padding: 18px; margin-bottom: 15px; }
            .question-text { font-size: 15px; margin-bottom: 25px; }
            
            /* Ensure slider labels fit perfectly without overlapping */
            .slider-labels { font-size: 11px; margin-top: 18px; }
            
            /* Make the thumb slightly larger on mobile for easier tapping */
            input[type=range]::-webkit-slider-thumb {
                height: 28px; width: 28px; margin-top: -10px;
            }
            input[type=range]::-moz-range-thumb {
                height: 28px; width: 28px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Pre-Attendance Conference Evaluator (PACE)</h2>
    
    <div class="dashboard">
        <div class="gauge-container">
            <div class="gauge-bg"></div>
            <div class="gauge-fill" id="gaugeFill"></div>
            <div class="score-container">
                <div class="score-display" id="scoreDisplay">0</div>
                <div class="score-max">out of 22</div>
            </div>
        </div>
        <div class="inference-badge" id="inferenceBadge">Questionable</div>
        <div class="inference-text" id="inferenceText">Score is below 14. Legitimacy is questionable. Registration must be done with caution.</div>
    </div>

    <form id="paceForm">
        </form>
</div>

<script>
    const questions = [
        "1. The conference has a peer-review protocol for submitted presentations.",
        "2. The conference has made no false claims of indexing in reputed libraries.",
        "3. The content of the conference brochures, proceedings, and website is grammatically sound.",
        "4. The conference has a specific theme or is focused on one subject of interest.",
        "5. The conference is associated with a legitimate, non-predatory journal.",
        "6. The conference is not known for sending unsolicited emails.",
        "7. The conference has a clearly outlined schedule.",
        "8. The conference is not marketed as being held in a tourist destination.",
        "9. The conference has a legitimate organizing and scientific committee.",
        "10. The abstracts of the delegates are not accepted quickly.",
        "11. The website layout is well-designed and professional."
    ];

    const form = document.getElementById('paceForm');
    
    questions.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = 'question';
        div.innerHTML = `
            <div class="question-text">${q}</div>
            <div class="slider-wrapper">
                <input type="range" class="score-slider" min="0" max="2" step="1" value="0" oninput="updateScore(this)">
                <div class="slider-labels">
                    <span class="label-text label-active">NO (0)</span>
                    <span class="label-text">MAYBE (1)</span>
                    <span class="label-text">YES (2)</span>
                </div>
            </div>
        `;
        form.appendChild(div);
    });

    function updateScore(sliderElement) {
        if(sliderElement) {
            const labels = sliderElement.nextElementSibling.querySelectorAll('.label-text');
            labels.forEach(lbl => lbl.classList.remove('label-active'));
            labels[sliderElement.value].classList.add('label-active');
        }

        const sliders = document.querySelectorAll('.score-slider');
        let totalScore = 0;
        
        sliders.forEach(slider => {
            totalScore += parseInt(slider.value);
        });

        document.getElementById('scoreDisplay').innerText = totalScore;

        const degrees = -135 + (totalScore / 22) * 180;
        const gaugeFill = document.getElementById('gaugeFill');
        gaugeFill.style.transform = `rotate(${degrees}deg)`;

        const badge = document.getElementById('inferenceBadge');
        const text = document.getElementById('inferenceText');

        if (totalScore < 14) {
            gaugeFill.style.borderColor = 'var(--danger-red) transparent transparent var(--danger-red)';
            badge.style.backgroundColor = 'var(--danger-red)';
            badge.style.color = '#ffffff';
            badge.innerText = "Questionable Legitimacy";
            text.innerText = "The score falls below the cutoff of 14. Registration to attend must be done with extreme caution.";
        } else if (totalScore >= 14 && totalScore <= 16) {
            gaugeFill.style.borderColor = 'var(--warning-yellow) transparent transparent var(--warning-yellow)';
            badge.style.backgroundColor = 'var(--warning-yellow)';
            badge.style.color = '#121212'; 
            badge.innerText = "Borderline Score";
            text.innerText = "Borderline scores should be evaluated based on the evaluator's informed judgment.";
        } else {
            gaugeFill.style.borderColor = 'var(--success-green) transparent transparent var(--success-green)';
            badge.style.backgroundColor = 'var(--success-green)';
            badge.style.color = '#121212';
            badge.innerText = "Likely Legitimate";
            text.innerText = "The conference demonstrates standard academic practices indicating legitimacy.";
        }
    }

    // Initialize the live dashboard on first load
    updateScore();
</script>

</body>
</html>
