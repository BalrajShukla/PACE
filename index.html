<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACE Tool - Dark Mode Assessment</title>
    <style>
        /* Dark Theme Variables */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333333;
            --accent-blue: #4facfe;
            --success-green: #00e676;
            --warning-yellow: #ffea00;
            --danger-red: #ff1744;
        }

        body { 
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            max-width: 850px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
        }
        
        .container { 
            background-color: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid var(--border-color);
        }
        
        h2 { 
            text-align: center; 
            color: #ffffff; 
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        /* Dashboard & Gauge Styles */
        .dashboard { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-bottom: 40px; 
            padding: 30px 20px; 
            background: #252525; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
        }
        
        .gauge-container {
            width: 240px; height: 120px;
            position: relative; overflow: hidden;
            margin-bottom: 15px;
        }
        .gauge-bg {
            width: 240px; height: 240px;
            box-sizing: border-box; border-radius: 50%;
            border: 30px solid #333;
